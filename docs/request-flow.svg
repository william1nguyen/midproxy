<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#f87171"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#60a5fa"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="960" height="640" rx="16" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" letter-spacing="0.5">REQUEST FLOW</text>

  <!-- ==================== ROW 1 (y=70): Steps 1 -> 2 -> 3 ==================== -->

  <!-- Step 1: Incoming Request (x=40..230) -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="190" height="56" rx="28" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="72" cy="98" r="14" fill="#06b6d4"/>
    <text x="72" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
    <text x="147" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490">Incoming Request</text>
    <text x="147" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">HTTP or CONNECT tunnel</text>
  </g>

  <!-- Step 2: Check Guards (x=290..480) -->
  <g filter="url(#shadow)">
    <rect x="290" y="70" width="190" height="56" rx="12" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="322" cy="98" r="14" fill="#06b6d4"/>
    <text x="322" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
    <text x="400" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490">Check Guards</text>
    <text x="400" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">Rate limit . Cache . Solve lock</text>
  </g>

  <!-- Step 3: Forward via Proxy (x=540..760) -->
  <g filter="url(#shadow)">
    <rect x="540" y="70" width="220" height="56" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="572" cy="98" r="14" fill="#8b5cf6"/>
    <text x="572" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
    <text x="665" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Forward via Proxy</text>
    <text x="665" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">Circuit breaker . TLS fingerprint</text>
  </g>

  <!-- 1 -> 2 -> 3 (horizontal) -->
  <path d="M 230 98 L 285 98" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 480 98 L 535 98" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== ROW 2 (y=175): CF Challenge diamond ==================== -->

  <!-- Step 3 bottom -> diamond top (vertical) -->
  <path d="M 650 126 L 650 170" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: CF Challenge? (center at 650,210) -->
  <g filter="url(#shadow)">
    <path d="M 650 175 L 730 210 L 650 245 L 570 210 Z" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="650" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Cloudflare</text>
    <text x="650" y="221" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Challenge?</text>
  </g>

  <!-- ==================== NO PATH (left from diamond) ==================== -->

  <!-- NO label -->
  <text x="555" y="204" text-anchor="end" font-size="10" font-weight="600" fill="#22c55e">NO</text>

  <!-- Diamond left -> Cache box (horizontal) -->
  <path d="M 570 210 L 460 210" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Cache + Return 200 (x=260..450) -->
  <g filter="url(#shadow)">
    <rect x="260" y="185" width="195" height="50" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="358" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Cache + Return 200</text>
    <text x="358" y="222" text-anchor="middle" font-size="9" fill="#64748b">GET 200 cached with TTL</text>
  </g>

  <!-- Cache -> Response to Client (horizontal) -->
  <path d="M 260 210 L 210 210" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Response to Client (x=40..205) -->
  <g filter="url(#shadow)">
    <rect x="40" y="185" width="165" height="50" rx="25" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="122" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Response to Client</text>
    <text x="122" y="222" text-anchor="middle" font-size="9" fill="#64748b">Success</text>
  </g>

  <!-- ==================== YES PATH (down from diamond) ==================== -->

  <!-- YES label -->
  <text x="662" y="268" font-size="10" font-weight="600" fill="#f87171">YES</text>

  <!-- Diamond bottom -> Has Cookies diamond (vertical) -->
  <path d="M 650 245 L 650 290" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Diamond: Has Cookies? (center at 650,325) -->
  <g filter="url(#shadow)">
    <path d="M 650 295 L 720 325 L 650 355 L 580 325 Z" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="650" y="322" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Has</text>
    <text x="650" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Cookies?</text>
  </g>

  <!-- ==================== YES cookies -> Retry Loop (right from diamond) ==================== -->

  <!-- YES label -->
  <text x="735" y="318" font-size="10" font-weight="600" fill="#f59e0b">YES</text>

  <!-- Diamond right -> Retry Loop (horizontal) -->
  <path d="M 720 325 L 775 325" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Retry Loop (x=780..910) -->
  <g filter="url(#shadow)">
    <rect x="780" y="300" width="130" height="50" rx="12" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="845" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Retry Loop</text>
    <text x="845" y="338" text-anchor="middle" font-size="9" fill="#94a3b8">backoff . new proxy</text>
  </g>

  <!-- Retry loop back to Step 3: up from Retry top, then left to Step 3 right edge -->
  <path d="M 845 300 L 845 98 L 765 98" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-amber)"/>
  <text x="810" y="90" font-size="8" fill="#d97706">retry with different proxy</text>

  <!-- ==================== NO cookies -> Trigger Solve (down from diamond) ==================== -->

  <!-- NO label -->
  <text x="566" y="335" text-anchor="end" font-size="10" font-weight="600" fill="#f87171">NO</text>

  <!-- Diamond left-bottom -> down to Trigger Solve -->
  <!-- Go left from diamond to x=520, then down to y=430 -->
  <path d="M 580 325 L 520 325 L 520 415" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Retry exhausted -> down then left to Trigger Solve right edge -->
  <path d="M 845 350 L 845 435 L 640 435" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="750" y="428" text-anchor="middle" font-size="8" fill="#f87171">retries exhausted</text>

  <!-- Step 4: Trigger Solve (x=420..635, y=410..460) -->
  <g filter="url(#shadow)">
    <rect x="420" y="410" width="215" height="50" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="452" cy="435" r="14" fill="#DC382D"/>
    <text x="452" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
    <text x="550" y="431" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Trigger Solve</text>
    <text x="550" y="447" text-anchor="middle" font-size="9" fill="#94a3b8">SET NX solving:{domain} . XADD</text>
  </g>

  <!-- Return 503 (x=40..240, y=410..460) -->
  <g filter="url(#shadow)">
    <rect x="40" y="410" width="200" height="50" rx="25" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
    <text x="140" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Return 503</text>
    <text x="140" y="448" text-anchor="middle" font-size="9" fill="#64748b">Retry-After: {remaining TTL}</text>
  </g>

  <!-- Trigger Solve -> Return 503 (horizontal) -->
  <path d="M 420 435 L 245 435" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- ==================== SOLVER SECTION ==================== -->

  <!-- Step 4 bottom -> Step 5 top (vertical) -->
  <path d="M 528 460 L 528 500" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Solver picks up (x=380..660, y=505..560) -->
  <g filter="url(#shadow)">
    <rect x="380" y="505" width="280" height="55" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="395" y="514" width="36" height="18" rx="9" fill="#3178C6"/>
    <text x="413" y="526.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">TS</text>
    <text x="545" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Solve + XACK</text>
    <text x="545" y="546" text-anchor="middle" font-size="9" fill="#94a3b8">Browser . cf_clearance . store cookies</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(40, 600)">
    <text x="0" y="14" font-size="10" font-weight="600" fill="#475569">LEGEND</text>
    <line x1="70" y1="10" x2="100" y2="10" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="106" y="14" font-size="9" fill="#64748b">Normal flow</text>
    <line x1="180" y1="10" x2="210" y2="10" stroke="#22c55e" stroke-width="1.5"/>
    <text x="216" y="14" font-size="9" fill="#64748b">Success</text>
    <line x1="265" y1="10" x2="295" y2="10" stroke="#f87171" stroke-width="1.5"/>
    <text x="301" y="14" font-size="9" fill="#64748b">Challenge</text>
    <line x1="365" y1="10" x2="395" y2="10" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="401" y="14" font-size="9" fill="#64748b">Retry</text>
    <line x1="440" y1="10" x2="470" y2="10" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="476" y="14" font-size="9" fill="#64748b">Decision</text>
  </g>
</svg>