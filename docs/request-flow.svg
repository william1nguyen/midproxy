<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#f87171"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="960" height="580" rx="16" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" letter-spacing="0.5">REQUEST FLOW</text>

  <!-- ==================== ROW 1: STEPS 1 → 2 → 3 ==================== -->

  <!-- Step 1: Incoming Request -->
  <g filter="url(#shadow)">
    <rect x="60" y="70" width="200" height="56" rx="28" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="92" cy="98" r="14" fill="#06b6d4"/>
    <text x="92" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
    <text x="172" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490">Incoming Request</text>
    <text x="172" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">HTTP or CONNECT tunnel</text>
  </g>

  <!-- Step 2: Check Guards -->
  <g filter="url(#shadow)">
    <rect x="330" y="70" width="200" height="56" rx="12" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="362" cy="98" r="14" fill="#06b6d4"/>
    <text x="362" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
    <text x="445" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490">Check Guards</text>
    <text x="445" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">Rate limit · Cache lookup</text>
  </g>

  <!-- Step 3: Forward Request -->
  <g filter="url(#shadow)">
    <rect x="600" y="70" width="200" height="56" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="632" cy="98" r="14" fill="#8b5cf6"/>
    <text x="632" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
    <text x="715" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Forward Request</text>
    <text x="715" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">TLS fingerprint · Chrome 131</text>
  </g>

  <!-- 1→2→3 connections -->
  <path d="M 260 98 L 325 98" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 530 98 L 595 98" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== DECISION DIAMOND ==================== -->
  <g filter="url(#shadow)">
    <path d="M 700 185 L 780 225 L 700 265 L 620 225 Z" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="700" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Cloudflare</text>
    <text x="700" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Challenge?</text>
  </g>

  <!-- Step 3 → Diamond (vertical) -->
  <path d="M 700 126 L 700 180" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== HAPPY PATH (LEFT — NO) ==================== -->

  <text x="598" y="218" text-anchor="end" font-size="10" font-weight="600" fill="#22c55e">NO</text>

  <!-- Cache Response -->
  <g filter="url(#shadow)">
    <rect x="340" y="197" width="200" height="56" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="440" y="221" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Cache Response</text>
    <text x="440" y="237" text-anchor="middle" font-size="9" fill="#64748b">GET 200 → store 5min TTL</text>
  </g>

  <!-- Return 200 -->
  <g filter="url(#shadow)">
    <rect x="60" y="197" width="200" height="56" rx="28" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="160" y="221" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Return 200</text>
    <text x="160" y="237" text-anchor="middle" font-size="9" fill="#64748b">Response to client</text>
  </g>

  <!-- Diamond → Cache → Return (straight horizontal) -->
  <path d="M 620 225 L 545 225" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M 340 225 L 265 225" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ==================== CHALLENGE PATH (DOWN — YES) ==================== -->

  <text x="714" y="286" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">YES</text>

  <!-- Step 4: Queue Solve Job -->
  <g filter="url(#shadow)">
    <rect x="560" y="300" width="210" height="56" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="592" cy="328" r="14" fill="#DC382D"/>
    <text x="592" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
    <text x="680" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Queue Solve Job</text>
    <text x="680" y="340" text-anchor="middle" font-size="9" fill="#94a3b8">Push to Redis queue</text>
  </g>

  <!-- Return 503 -->
  <g filter="url(#shadow)">
    <rect x="60" y="300" width="200" height="56" rx="28" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
    <text x="160" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Return 503</text>
    <text x="160" y="340" text-anchor="middle" font-size="9" fill="#64748b">Solving challenge...</text>
  </g>

  <!-- Diamond → Queue (vertical) -->
  <path d="M 700 265 L 700 295" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Queue → Return 503 (straight horizontal, dashed) -->
  <path d="M 560 328 L 265 328" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- ==================== SOLVER SECTION ==================== -->

  <!-- Step 5: Solve Challenge -->
  <g filter="url(#shadow)">
    <rect x="560" y="400" width="210" height="64" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Node.js badge — top-left, not overlapping title -->
    <rect x="572" y="410" width="56" height="18" rx="9" fill="#339933"/>
    <text x="600" y="422.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Node.js</text>
    <text x="700" y="423" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Solve Challenge</text>
    <text x="665" y="450" text-anchor="middle" font-size="9" fill="#94a3b8">Real browser · Wait cf_clearance</text>
  </g>

  <!-- Step 6: Store Credentials -->
  <g filter="url(#shadow)">
    <rect x="560" y="505" width="210" height="64" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <!-- Redis badge — top-left -->
    <rect x="572" y="515" width="50" height="18" rx="9" fill="#DC382D"/>
    <text x="597" y="527.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Redis</text>
    <text x="700" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Store Credentials</text>
    <text x="665" y="554" text-anchor="middle" font-size="9" fill="#94a3b8">Cookies · User Agent · Proxy</text>
  </g>

  <!-- Queue → Solver → Store (vertical) -->
  <path d="M 665 356 L 665 395" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 665 464 L 665 500" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Loop back: Store → right → up → left → Check Guards (orthogonal 90-degree) -->
  <path d="M 770 537 L 880 537 L 880 98 L 805 98" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-green)"/>
  <rect x="848" y="300" width="64" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="880" y="316" text-anchor="middle" font-size="8" font-weight="600" fill="#16a34a">Next req</text>
  <text x="880" y="328" text-anchor="middle" font-size="8" fill="#16a34a">has cookies</text>
</svg>
