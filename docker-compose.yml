x-common: &common
  networks:
    - default
  restart: unless-stopped
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

services:
  valkey:
    image: valkey/valkey:8
    hostname: valkey
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
        --requirepass ${VALKEY_PASSWORD:-redis}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    ports:
      - 6379:6379
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 128m
    <<: *common

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: proxy
    ports:
      - 8080:8080
    volumes:
      - ./configs/config.yaml:/etc/midproxy/config.yaml:ro
    depends_on:
      - valkey
    <<: *common

  solver:
    build:
      context: ./solver
      dockerfile: Dockerfile
    hostname: solver
    shm_size: "256m"
    env_file:
      - ./solver/.env
    environment:
      REDIS_URL: redis://:${VALKEY_PASSWORD:-redis}@valkey:6379/1
    depends_on:
      - valkey
    <<: *common

volumes:
  valkey_data: